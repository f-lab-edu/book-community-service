name: Deploy to EC2 with Docker Compose

on:
  push:
    branches:
      - main

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 레포지토리 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: 3. application.yml 동적 생성 (Secret 활용)
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > src/main/resources/application.yml

      - name: 4. Gradle 빌드 (테스트 제외)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: 5. 빌드된 파일 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "build/libs/*SNAPSHOT.jar, Dockerfile"
          target: "~/book-community-service"
          strip_components: 0

      - name: 6. SSH(원격접속)로 EC2에 접속하여 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            mkdir -p ~/book-community-service
            cd ~/book-community-service
            
            echo "${{ secrets.DOCKER_COMPOSE_YML }}" > docker-compose.yml
            
            cp build/libs/*SNAPSHOT.jar ./app.jar
            
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            sudo docker image prune -f